name: Run Oslo Quant

on:
  # Manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      tickers:
        description: "Tickers to run (space-separated, e.g. TEL.OL MOWI.OL). Leave blank for all 14."
        required: false
        default: ""
      frameworks:
        description: "Frameworks to run (dupont piotroski sloan ohlson altman). Leave blank for all 5."
        required: false
        default: ""
      force_refresh:
        description: "Force re-fetch data even if cached"
        required: false
        default: "false"
        type: boolean

  # Automatic weekly run — every Monday at 06:00 UTC (08:00 Oslo time)
  schedule:
    - cron: "0 6 * * 1"

jobs:
  compute:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit results back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install oslo-quant
        run: pip install -e .

      - name: Run oslo-quant
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.tickers }}" ]; then
            ARGS="$ARGS --tickers ${{ github.event.inputs.tickers }}"
          fi
          if [ -n "${{ github.event.inputs.frameworks }}" ]; then
            ARGS="$ARGS --frameworks ${{ github.event.inputs.frameworks }}"
          fi
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            ARGS="$ARGS --force-refresh"
          fi
          oslo-quant $ARGS

      - name: Generate HTML report
        run: oslo-quant-report

      - name: Commit results and report back to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/results/ index.html
          git diff --staged --quiet || git commit -m "Update results and report [$(date -u +%Y-%m-%d)]"
          git push origin "HEAD:${{ github.ref_name }}"
